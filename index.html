<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Vivek!</title>
    <style>
        :root { --flame-tilt: 0deg; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a2e; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* Password Section */
        #pass-gate { 
            text-align: center; 
            background: #16213e; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #0f3460;
        }
        input { 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            width: 220px; 
            font-size: 16px; 
            margin-bottom: 10px;
        }
        button { 
            padding: 12px 25px; 
            background: #e94560; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #ff2e63; }
        #hint { color: #f1c40f; margin-top: 15px; display: none; font-style: italic; font-size: 0.9rem; }

        /* Main Content (Hidden Initially) */
        #main-content { display: none; text-align: center; width: 90%; max-width: 600px; padding: 20px; }
        h1 { color: #e94560; font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(233, 69, 96, 0.5); }

        /* Animated Cake */
        .cake-container { margin: 40px 0; position: relative; height: 180px; }
        .cake { 
            position: relative; width: 160px; height: 100px; 
            background: #f9ca24; margin: 0 auto; 
            border-radius: 15px 15px 0 0;
            box-shadow: inset 0 -10px 0 #f0932b;
        }
        .candle { 
            position: absolute; top: -45px; left: 50%; 
            width: 12px; height: 45px; 
            background: #eb4d4b; transform: translateX(-50%);
            border-radius: 3px;
        }
        .flame { 
            position: absolute; top: -25px; left: 50%; 
            width: 18px; height: 30px; 
            background: radial-gradient(circle at bottom, #ff9f43, #ff4757); 
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: translateX(-50%) rotate(var(--flame-tilt));
            box-shadow: 0 0 15px #ff9f43;
            transition: transform 0.1s ease-out;
            transform-origin: bottom center;
        }

        /* Slideshow */
        .slideshow-container { 
            position: relative; height: 400px; width: 100%; 
            margin-top: 30px; overflow: hidden; 
            border-radius: 20px; border: 4px solid #0f3460;
            background: #0f3460;
        }
        .slide { 
            position: absolute; width: 100%; height: 100%; 
            object-fit: cover; opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
            left: 0; top: 0;
        }
        .slide.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="pass-gate">
        <h2>🔒 Private Access</h2>
        <input type="password" id="pw-input" placeholder="Enter password...">
        <br>
        <button onclick="checkPassword()">Unlock Surprise</button>
        <p id="hint">Hint: excited ka Vivek style synonym</p>
    </div>

    <div id="main-content">
        <h1>Happy Birthday Vivek! 🎂</h1>
        
        <div class="cake-container">
            <div class="cake">
                <div class="candle">
                    <div class="flame" id="flame"></div>
                </div>
            </div>
        </div>

        <div class="slideshow-container" id="slideshow">
            <img src="images/photo1.jpg" class="slide">
            <img src="images/photo2.jpg" class="slide">
            <img src="images/photo3.jpg" class="slide">
            <img src="images/photo4.jpg" class="slide">
            <img src="images/photo5.jpg" class="slide">
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CORRECT_PW = "hyped"; // Change this to your desired password
        let currentSlide = 0;

        function checkPassword() {
            const input = document.getElementById('pw-input').value;
            if (input.toLowerCase() === CORRECT_PW) {
                document.getElementById('pass-gate').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                
                setupAndStartSlideshow(); 
                requestMotionPermission();
            } else {
                document.getElementById('hint').style.display = 'block';
                // Small shake effect for wrong password
                const gate = document.getElementById('pass-gate');
                gate.style.transform = "translateX(10px)";
                setTimeout(() => gate.style.transform = "translateX(-10px)", 50);
                setTimeout(() => gate.style.transform = "translateX(0)", 100);
            }
        }

        function setupAndStartSlideshow() {
            const container = document.getElementById('slideshow');
            const slides = Array.from(container.getElementsByClassName('slide'));

            // Shuffle Logic
            for (let i = slides.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [slides[i], slides[j]] = [slides[j], slides[i]];
            }

            // Re-inject shuffled slides
            container.innerHTML = '';
            slides.forEach(slide => container.appendChild(slide));

            // Start Animation
            if (slides.length > 0) {
                slides[0].classList.add('active');
                setInterval(() => {
                    const allSlides = container.querySelectorAll('.slide');
                    allSlides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % allSlides.length;
                    allSlides[currentSlide].classList.add('active');
                }, 3500); // 3.5 seconds per photo
            }
        }

        // --- TILT LOGIC ---
        function requestMotionPermission() {
            // Check if it's an iOS device requiring permission
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            window.addEventListener('deviceorientation', handleMotion);
                        }
                    })
                    .catch(e => console.error("Motion sensor access denied."));
            } else {
                // Non-iOS or older devices
                window.addEventListener('deviceorientation', handleMotion);
            }
        }

        function handleMotion(event) {
            // Gamma is left-to-right tilt (-90 to 90)
            let tilt = event.gamma || 0; 
            // Limit tilt for a natural look
            if (tilt > 45) tilt = 45;
            if (tilt < -45) tilt = -45;
            
            // Apply tilt to CSS variable
            document.documentElement.style.setProperty('--flame-tilt', (tilt * -0.8) + 'deg');
        }
    </script>
</body>
</html>
