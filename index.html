<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        :root { --flame-tilt: 0deg; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Password Gate */
        #pass-gate { text-align: center; background: #16213e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 8px; border: none; width: 220px; font-size: 16px; margin-bottom: 10px; text-align: center; }
        button { padding: 12px 25px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #hint { color: #f1c40f; margin-top: 15px; display: none; font-style: italic; }

        /* Cake Page */
        #cake-page { display: none; text-align: center; }
        .cake { position: relative; width: 250px; height: 120px; background: #f9ca24; margin: 60px auto; border-radius: 15px 15px 0 0; box-shadow: inset 0 -10px 0 #f0932b; }
        
        /* 22 Candles Grid */
        .candles-container { 
            position: absolute; top: -35px; left: 10px; right: 10px;
            display: grid; grid-template-columns: repeat(11, 1fr); gap: 5px;
        }
        .candle { width: 6px; height: 35px; background: #eb4d4b; position: relative; border-radius: 2px; }
        .flame { 
            position: absolute; top: -15px; left: 50%; width: 10px; height: 18px; 
            background: #ff9f43; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: translateX(-50%) rotate(var(--flame-tilt));
            transform-origin: bottom center; box-shadow: 0 0 10px #ff9f43;
        }

        .btn-next { margin-top: 40px; padding: 15px 30px; font-size: 1.2rem; background: #4ee; color: #1a1a2e; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="pass-gate">
        <h2>🔒 Private Access</h2>
        <input type="password" id="pw-input" placeholder="Enter password...">
        <br>
        <button onclick="checkPassword()">Unlock</button>
        <p id="hint">Hint: excited ka Vivek style synonym</p>
    </div>

    <div id="cake-page">
        <h1>Happy Birthday Vivek! 🎂</h1>
        <div class="cake">
            <div class="candles-container" id="candles-grid"></div>
        </div>
        <button class="btn-next" onclick="location.href='gallery.html'">Click Here 🎁</button>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('pw-input').value;
            if (input.toLowerCase() === "assited") {
                document.getElementById('pass-gate').style.display = 'none';
                document.getElementById('cake-page').style.display = 'block';
                createCandles();
                requestMotion();
            } else {
                document.getElementById('hint').style.display = 'block';
            }
        }

        function createCandles() {
            const grid = document.getElementById('candles-grid');
            for(let i=0; i<22; i++) {
                const c = document.createElement('div');
                c.className = 'candle';
                c.innerHTML = '<div class="flame"></div>';
                grid.appendChild(c);
            }
        }

        function requestMotion() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') window.addEventListener('deviceorientation', handleMotion); });
            } else { window.addEventListener('deviceorientation', handleMotion); }
        }

        function handleMotion(e) {
            let tilt = e.gamma || 0;
            document.documentElement.style.setProperty('--flame-tilt', (tilt * -0.6) + 'deg');
        }
    </script>
</body>
</html>
