<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        :root { --flame-tilt: 0deg; --accent: #e94560; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1a1a2e; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        #pass-gate, #cake-page, #box-page, #gallery-page { display: none; text-align: center; width: 100%; }

        /* Password Gate */
        #pass-gate { display: block; background: #16213e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 300px; }
        input { padding: 12px; border-radius: 8px; border: none; width: 80%; font-size: 16px; margin-bottom: 10px; text-align: center; }
        button { padding: 12px 25px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #hint { color: #f1c40f; margin-top: 15px; display: none; font-style: italic; font-size: 0.9rem; }

        /* Cake Section */
        .cake { position: relative; width: 220px; height: 100px; background: #f9ca24; margin: 50px auto; border-radius: 12px 12px 0 0; box-shadow: inset 0 -8px 0 #f0932b; }
        .candles-container { 
            position: absolute; top: -35px; left: 10px; right: 10px;
            display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px;
        }
        .candle { width: 5px; height: 35px; background: #eb4d4b; position: relative; border-radius: 2px; }
        .flame { 
            position: absolute; top: -15px; left: 50%; width: 10px; height: 18px; 
            background: #ff9f43; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: translateX(-50%) rotate(var(--flame-tilt));
            transform-origin: bottom center; box-shadow: 0 0 10px #ff9f43;
        }

        /* Next Button */
        .btn-next { padding: 15px 30px; font-size: 1.1rem; background: #4ee; color: #1a1a2e; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; }

        /* The Box */
        #gift-box { width: 180px; height: 180px; background: var(--accent); position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; border-radius: 10px; margin: 0 auto; transition: 0.6s; }
        #gift-box::after { content: ''; position: absolute; width: 100%; height: 15px; background: #4ee; }
        #gift-box::before { content: ''; position: absolute; width: 15px; height: 100%; background: #4ee; }
        .box-open { transform: scale(0); opacity: 0; }

        /* Camera Roll Style Gallery */
        #gallery-page { height: 100vh; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px 0; box-sizing: border-box; }
        
        .main-viewer { 
            flex-grow: 1; width: 90vw; max-width: 600px; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border-radius: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .main-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; animation: fadeIn 0.8s; }
        .main-img.active { display: block; }

        .camera-roll { 
            width: 100%; height: 80px; overflow-x: auto; 
            white-space: nowrap; padding: 10px; background: rgba(0,0,0,0.3);
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }
        .camera-roll::-webkit-scrollbar { display: none; } /* Hide scrollbar for Chrome/Safari */
        
        .thumb { 
            height: 60px; width: 60px; object-fit: cover; 
            margin: 0 5px; border-radius: 5px; opacity: 0.4;
            transition: 0.3s; border: 2px solid transparent;
        }
        .thumb.active { opacity: 1; border-color: #4ee; transform: scale(1.1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="pass-gate">
        <h2>🔒 Private Access</h2>
        <input type="password" id="pw-input" placeholder="Password...">
        <br>
        <button onclick="checkPassword()">Unlock</button>
        <p id="hint">Hint: excited ka Vivek style synonym</p>
    </div>

    <div id="cake-page">
        <h1>Happy Birthday Vivek! 🎂</h1>
        <div class="cake">
            <div class="candles-container" id="candles-grid"></div>
        </div>
        <button class="btn-next" onclick="goToBox()">Click Here 🎁</button>
    </div>

    <div id="box-page">
        <h2>Open your gift...</h2>
        <div id="gift-box" onclick="openBox()">
            <span style="color:white; font-weight:bold;">OPEN</span>
        </div>
    </div>

    <div id="gallery-page">
        <div class="main-viewer" id="main-viewer"></div>
        <div class="camera-roll" id="camera-roll"></div>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById('pw-input').value.toLowerCase() === "assited") {
                document.getElementById('pass-gate').style.display = 'none';
                document.getElementById('cake-page').style.display = 'block';
                createCandles();
                requestMotion();
            } else { document.getElementById('hint').style.display = 'block'; }
        }

        function createCandles() {
            const grid = document.getElementById('candles-grid');
            for(let i=0; i<22; i++) {
                const c = document.createElement('div');
                c.className = 'candle';
                c.innerHTML = '<div class="flame"></div>';
                grid.appendChild(c);
            }
        }

        function goToBox() {
            document.getElementById('cake-page').style.display = 'none';
            document.getElementById('box-page').style.display = 'block';
        }

        function openBox() {
            document.getElementById('gift-box').classList.add('box-open');
            setTimeout(() => {
                document.getElementById('box-page').style.display = 'none';
                document.getElementById('gallery-page').style.display = 'flex';
                initGallery();
            }, 600);
        }

        function initGallery() {
            const viewer = document.getElementById('main-viewer');
            const roll = document.getElementById('camera-roll');
            let indices = Array.from({length: 45}, (_, i) => i + 1);
            indices.sort(() => Math.random() - 0.5); // Random Order

            indices.forEach((num, i) => {
                // Create Main Image
                const img = document.createElement('img');
                img.src = `${num}.jpeg`;
                img.className = 'main-img';
                img.id = `main-${i}`;
                if (i === 0) img.classList.add('active');
                viewer.appendChild(img);

                // Create Thumbnail
                const thumb = document.createElement('img');
                thumb.src = `${num}.jpeg`;
                thumb.className = 'thumb';
                thumb.id = `thumb-${i}`;
                if (i === 0) thumb.classList.add('active');
                roll.appendChild(thumb);
            });

            let current = 0;
            setInterval(() => {
                // Remove active from current
                document.getElementById(`main-${current}`).classList.remove('active');
                document.getElementById(`thumb-${current}`).classList.remove('active');

                // Move to next
                current = (current + 1) % indices.length;

                // Add active to next
                const nextMain = document.getElementById(`main-${current}`);
                const nextThumb = document.getElementById(`thumb-${current}`);
                nextMain.classList.add('active');
                nextThumb.classList.add('active');

                // Scroll camera roll to the active thumbnail
                nextThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }, 3000);
        }

        function requestMotion() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') window.addEventListener('deviceorientation', handleMotion); });
            } else { window.addEventListener('deviceorientation', handleMotion); }
        }

        function handleMotion(e) {
            let tilt = e.gamma || 0;
            document.documentElement.style.setProperty('--flame-tilt', (tilt * -0.6) + 'deg');
        }
    </script>
</body>
</html>
