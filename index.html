<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Vivek</title>
    <style>
        :root { --flame-tilt: 0deg; --accent: #e94560; --bg: #0f0f1a; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg); color: white; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; overflow: hidden; 
        }

        #pass-gate, #cake-page, #box-page, #gallery-page { display: none; text-align: center; width: 100%; }

        /* Stage 1: Password Gate */
        #pass-gate { display: block; background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); max-width: 320px; }
        input { padding: 14px; border-radius: 12px; border: none; width: 85%; font-size: 16px; margin-bottom: 15px; text-align: center; background: rgba(255,255,255,0.9); outline: none; }
        button { padding: 12px 30px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        #hint { color: #f1c40f; margin-top: 15px; display: none; font-size: 0.85rem; }

        /* Stage 2: Cake Page (Fixed Spacing) */
        #cake-page h1 { margin-bottom: 80px; font-size: 2.5rem; color: var(--accent); text-shadow: 0 0 20px rgba(233, 69, 96, 0.3); }
        .cake { position: relative; width: 260px; height: 110px; background: #f9ca24; margin: 0 auto 60px auto; border-radius: 15px 15px 0 0; box-shadow: inset 0 -10px 0 #f0932b; }
        
        /* 22 Candles */
        .candles-container { position: absolute; top: -38px; left: 12px; right: 12px; display: grid; grid-template-columns: repeat(11, 1fr); gap: 5px; }
        .candle { width: 6px; height: 38px; background: #eb4d4b; position: relative; border-radius: 2px; }
        .flame { 
            position: absolute; top: -16px; left: 50%; width: 11px; height: 20px; background: radial-gradient(#fff, #ff9f43, #ff4757); 
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; transform: translateX(-50%) rotate(var(--flame-tilt));
            transform-origin: bottom center; box-shadow: 0 0 12px #ff9f43; 
        }

        /* Next Button */
        .btn-next { padding: 18px 45px; background: #4ee; color: #111; border: none; border-radius: 50px; cursor: pointer; font-weight: 800; font-size: 1.1rem; transition: transform 0.2s; }
        .btn-next:hover { transform: scale(1.05); }

        /* Stage 3: The Box */
        #gift-box { width: 160px; height: 160px; background: var(--accent); margin: 30px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: 0.6s; position: relative; }
        #gift-box::after { content: ''; position: absolute; width: 100%; height: 20px; background: #4ee; }
        #gift-box::before { content: ''; position: absolute; width: 20px; height: 100%; background: #4ee; }
        .box-open { transform: scale(0); opacity: 0; }

        /* Stage 4: CAMERA ROLL UI */
        #gallery-page { height: 100vh; flex-direction: column; background: black; }
        .viewer-area { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .main-img { max-width: 95%; max-height: 85%; object-fit: contain; position: absolute; opacity: 0; transition: opacity 0.8s ease-in-out, transform 0.8s ease; transform: scale(0.92); }
        .main-img.active { opacity: 1; transform: scale(1); }

        .roll-container { 
            height: 110px; width: 100%; background: rgba(10, 10, 10, 0.98);
            display: flex; align-items: center; border-top: 1px solid #222;
            overflow-x: auto; scroll-behavior: smooth; padding: 0 50vw; 
            scrollbar-width: none;
        }
        .roll-container::-webkit-scrollbar { display: none; }
        .thumb { min-width: 65px; height: 65px; margin: 0 10px; object-fit: cover; border-radius: 10px; opacity: 0.25; transition: 0.4s; border: 2px solid transparent; }
        .thumb.active { opacity: 1; transform: scale(1.25); border-color: var(--accent); box-shadow: 0 0 15px rgba(233, 69, 96, 0.4); z-index: 10; }
    </style>
</head>
<body>

    <div id="pass-gate">
        <h2>🔒 Private Access</h2>
        <input type="password" id="pw-input" placeholder="Password...">
        <br>
        <button onclick="checkPassword()">Unlock</button>
        <p id="hint">Hint: excited ka Vivek style synonym</p>
    </div>

    <div id="cake-page">
        <h1>Happy Birthday Vivek! 🎂</h1>
        <div class="cake">
            <div class="candles-container" id="candles-grid"></div>
        </div>
        <button class="btn-next" onclick="goToBox()">Click Here 🎁</button>
    </div>

    <div id="box-page">
        <h2>A box of memories...</h2>
        <div id="gift-box" onclick="openBox()">
            <span style="font-weight:bold; color: white; z-index: 2;">OPEN</span>
        </div>
    </div>

    <div id="gallery-page">
        <div class="viewer-area" id="main-viewer"></div>
        <div class="roll-container" id="camera-roll"></div>
    </div>

    <script>
        const PASS = "assited";
        const TOTAL = 50; // Updated to 50 images

        function checkPassword() {
            if (document.getElementById('pw-input').value.toLowerCase() === PASS) {
                document.getElementById('pass-gate').style.display = 'none';
                document.getElementById('cake-page').style.display = 'block';
                for(let i=0; i<22; i++) {
                    const c = document.createElement('div');
                    c.className = 'candle'; c.innerHTML = '<div class="flame"></div>';
                    document.getElementById('candles-grid').appendChild(c);
                }
                requestMotion();
            } else { document.getElementById('hint').style.display = 'block'; }
        }

        function goToBox() { document.getElementById('cake-page').style.display = 'none'; document.getElementById('box-page').style.display = 'block'; }

        function openBox() {
            document.getElementById('gift-box').classList.add('box-open');
            setTimeout(() => {
                document.getElementById('box-page').style.display = 'none';
                document.getElementById('gallery-page').style.display = 'flex';
                initRoll();
            }, 600);
        }

        function initRoll() {
            const viewer = document.getElementById('main-viewer');
            const roll = document.getElementById('camera-roll');
            let ids = Array.from({length: TOTAL}, (_, i) => i + 1).sort(() => Math.random() - 0.5);

            ids.forEach((n, i) => {
                const img = document.createElement('img');
                img.src = `${n}.jpeg`; img.className = 'main-img'; img.id = `m-${i}`;
                if(i===0) img.classList.add('active');
                viewer.appendChild(img);

                const t = document.createElement('img');
                t.src = `${n}.jpeg`; t.className = 'thumb'; t.id = `t-${i}`;
                if(i===0) t.classList.add('active');
                roll.appendChild(t);
            });

            let cur = 0;
            setInterval(() => {
                document.getElementById(`m-${cur}`).classList.remove('active');
                document.getElementById(`t-${cur}`).classList.remove('active');
                cur = (cur + 1) % TOTAL;
                document.getElementById(`m-${cur}`).classList.add('active');
                const nextT = document.getElementById(`t-${cur}`);
                nextT.classList.add('active');
                
                const scrollPos = nextT.offsetLeft - (window.innerWidth / 2) + (nextT.offsetWidth / 2);
                roll.scrollTo({ left: scrollPos, behavior: 'smooth' });
            }, 3000);
        }

        function requestMotion() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') window.addEventListener('deviceorientation', handleTilt); });
            } else { window.addEventListener('deviceorientation', handleTilt); }
        }

        function handleTilt(e) {
            let tilt = e.gamma || 0;
            document.documentElement.style.setProperty('--flame-tilt', (tilt * -0.6) + 'deg');
        }
    </script>
</body>
</html>
