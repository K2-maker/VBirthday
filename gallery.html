<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* The Box Animation */
        #gift-box { width: 200px; height: 200px; background: #e94560; position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; border-radius: 10px; transition: 1s; }
        #gift-box::after { content: ''; position: absolute; width: 100%; height: 20px; background: #4ee; }
        #gift-box::before { content: ''; position: absolute; width: 20px; height: 100%; background: #4ee; }
        
        .box-open { transform: scale(0); opacity: 0; pointer-events: none; }

        /* Hidden Slideshow */
        #gallery-container { display: none; width: 90vw; max-width: 500px; height: 70vh; border: 5px solid white; border-radius: 20px; overflow: hidden; position: relative; }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.5s; }
        .slide.active { opacity: 1; }
    </style>
</head>
<body>

    <div id="gift-box" onclick="openBox()">
        <span style="font-weight:bold;">OPEN ME</span>
    </div>

    <div id="gallery-container"></div>

    <script>
        function openBox() {
            document.getElementById('gift-box').classList.add('box-open');
            setTimeout(() => {
                document.getElementById('gallery-container').style.display = 'block';
                loadSlideshow();
            }, 800);
        }

        function loadSlideshow() {
            const container = document.getElementById('gallery-container');
            let indices = Array.from({length: 45}, (_, i) => i + 1);
            
            // Shuffle
            indices.sort(() => Math.random() - 0.5);

            indices.forEach((num, i) => {
                const img = document.createElement('img');
                img.src = `${num}.jpeg`;
                img.className = 'slide' + (i === 0 ? ' active' : '');
                container.appendChild(img);
            });

            let current = 0;
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 3000);
        }
    </script>
</body>
</html>
